<!doctype html>
<html lang="si">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TA Daily Plan - DSI Transport</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <div id="top"></div>
  <div class="container">

    <div class="card">
      <div class="row">
        <div class="col-4">
          <label>Batch Date</label>
          <input id="date" type="date" />
        </div>
        <div class="col-8" style="display:flex;gap:10px;align-items:end;justify-content:flex-end">
          <button class="btn" id="reload">🔄 Load</button>
          <button class="btn primary" id="submit">📨 Submit to HR</button>
        </div>
      </div>
      <div style="height:10px"></div>
      <div id="status" style="color:var(--muted)"></div>
    </div>

    <div class="card">
      <div class="row">
        <div class="col-12">
          <h3 style="margin:0">🚍 Available Vehicles</h3>
          <div style="color:var(--muted);font-size:13px">එක vehicle එකක් එකම route/group එකකට පමණක් select කරන්න පුළුවන්.</div>
          <div id="vehList" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">🧠 System Auto-Routes (Counts Only)</h3>
      <div style="color:var(--muted);font-size:13px">Admin day lock වුන පස්සේ system එකම rules අනුව groups හදලා තියේ. මෙතන TA ට පෙන්වන්නේ route/group + pax + guidance විතරයි.</div>
      <div style="height:10px"></div>
      <div id="groups"></div>
    </div>

  </div>

<script type="module">
  import { mountTopbar } from '../js/layout.js';
  import { toast } from '../js/ui.js';
  import { requireLogin } from '../js/auth.js';
  import { api } from '../js/api.js';

  mountTopbar({ root: document.querySelector('#top'), title: 'Transport Authority (TA) • Daily Plan' });
  const ctx = requireLogin();
  if(ctx.user.role!=='TA'){
    toast('Forbidden','err');
    location.href='../index.html';
  }

  const dateEl = document.querySelector('#date');
  const statusEl = document.querySelector('#status');
  const vehList = document.querySelector('#vehList');
  const groupsBox = document.querySelector('#groups');
  const today = new Date();
  dateEl.value = new Date(today.getTime() - (today.getTimezoneOffset()*60000)).toISOString().slice(0,10);

  let vehicles = [];
  let batch = null;
  let groups = [];
  // selections: group_id -> Set(vehicle_id)
  const selections = new Map();

  function renderVehicles(){
    vehList.innerHTML = vehicles.map(v=>`
      <div class="glass" style="border:1px solid var(--stroke);padding:10px;border-radius:14px;background:rgba(255,255,255,.06)">
        <div style="font-weight:800">${v.vehicle_no} <span style="color:var(--muted);font-weight:600">(${v.vehicle_type})</span></div>
        <div style="color:var(--muted);font-size:12px">Cap ${v.capacity} • ${v.driver_name} • ${v.driver_phone}</div>
      </div>
    `).join('');
  }

  function usedVehicleIds(){
    const used = new Set();
    for (const set of selections.values()) {
      for (const id of set) used.add(id);
    }
    return used;
  }

  function renderGroups(){
    if(!batch){ groupsBox.innerHTML = '<div style="color:var(--muted)">Batch not loaded.</div>'; return; }
    const used = usedVehicleIds();
    groupsBox.innerHTML = groups.map(g=>{
      const sel = selections.get(g.id) || new Set();
      const sug = g.suggestions;
      const mix = sug?.suggested_mix;
      const mixText = mix ? `${mix.buses} BUS + ${mix.vans} VAN` : '-';

      const opts = vehicles.filter(v=>v.active!==false).map(v=>{
        const disabled = used.has(v.id) && !sel.has(v.id);
        const checked = sel.has(v.id);
        return `
          <label style="display:flex;gap:8px;align-items:center;opacity:${disabled?0.5:1}">
            <input type="checkbox" data-gid="${g.id}" data-vid="${v.id}" ${checked?'checked':''} ${disabled?'disabled':''}/>
            <span>${v.vehicle_no} (${v.vehicle_type})</span>
          </label>
        `;
      }).join('');

      return `
        <div style="border:1px solid var(--stroke);border-radius:16px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,.04)">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center">
            <div>
              <div style="font-weight:900">${g.group_label}</div>
              <div style="color:var(--muted);font-size:13px">PAX: <b>${g.pax_count}</b> • Side: ${g.side_label}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800">Guidance</div>
              <div style="color:var(--muted);font-size:12px">
                VAN: ${sug?.suggested_vans} • BUS: ${sug?.suggested_buses} • MIX: ${mixText}
              </div>
            </div>
          </div>
          <div style="height:10px"></div>
          <div class="row">
            <div class="col-12">
              <div style="font-weight:800;margin-bottom:6px">Select Vehicles (මෙ route එකට)</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${opts}</div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  groupsBox.addEventListener('change', (e)=>{
    const c = e.target;
    if(!(c instanceof HTMLInputElement)) return;
    const gid = Number(c.dataset.gid);
    const vid = Number(c.dataset.vid);
    if(!Number.isFinite(gid)||!Number.isFinite(vid)) return;
    const set = selections.get(gid) || new Set();
    if(c.checked) set.add(vid); else set.delete(vid);
    selections.set(gid, set);
    renderGroups();
  });

  async function loadVehicles(){
    vehicles = await api.get('/lookup/vehicles');
    renderVehicles();
  }

  async function loadBatch(){
    const d = dateEl.value;
    batch = null; groups = []; selections.clear();
    statusEl.textContent = 'Loading...';
    const data = await api.get(`/ta/batches?date=${encodeURIComponent(d)}`);
    batch = data.batch;
    groups = data.groups;
    // preload existing selections
    for (const g of groups) {
      const set = new Set((g.selected_vehicles||[]).map(x=>x.vehicle_id));
      selections.set(g.id, set);
    }
    statusEl.textContent = `Batch: ${batch.batch_date} • Status: ${batch.status}`;
    renderGroups();
  }

  document.querySelector('#reload').addEventListener('click', async ()=>{
    try{ await loadBatch(); toast('✅ Loaded'); }catch(e){ toast('❌ '+e.message,'err'); statusEl.textContent=''; }
  });

  document.querySelector('#submit').addEventListener('click', async ()=>{
    try{
      if(!batch) throw new Error('Batch load කරන්න');
      const payload = {
        selections: groups.map(g=>({ group_id: g.id, vehicle_ids: [...(selections.get(g.id)||new Set())] })),
        submit: true
      };
      await api.post(`/ta/batches/${batch.id}/plan`, payload);
      toast('✅ Submitted to HR');
      await loadBatch();
    }catch(e){ toast('❌ '+e.message,'err'); }
  });

  await loadVehicles();
  await loadBatch();
</script>
</body>
</html>
